<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やさしいニュースメーカー</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3D3B38">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Easy News">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cloud-dancer: #F5F3F0;
            --soft-gray: #E8E6E3;
            --medium-gray: #B8B5B0;
            --text-gray: #6B6966;
            --dark-gray: #3D3B38;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
            background: linear-gradient(145deg, var(--cloud-dancer) 0%, #FAFAF8 50%, var(--soft-gray) 100%);
            min-height: 100vh;
            padding: 24px;
            color: var(--dark-gray);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 28px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 1.9rem;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--medium-gray);
        }

        .section {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-gray);
            margin-bottom: 6px;
        }

        input[type="password"], textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--soft-gray);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--medium-gray);
        }

        textarea {
            height: 140px;
            resize: vertical;
        }

        .api-section {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .api-section .input-wrap {
            flex: 1;
        }

        .api-status {
            padding: 14px 16px;
            background: var(--soft-gray);
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--text-gray);
            white-space: nowrap;
        }

        .api-status.saved {
            background: #E8F0E8;
            color: #4A7A5A;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--dark-gray);
            color: var(--cloud-dancer);
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2D2B28;
        }

        .btn:disabled {
            background: var(--medium-gray);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--dark-gray);
            border: 1px solid var(--medium-gray);
            padding: 10px 16px;
            width: auto;
        }

        .btn-secondary:hover {
            background: var(--soft-gray);
        }

        .result-box {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--soft-gray);
            margin-top: 20px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-gray);
        }

        .btn-speak {
            padding: 8px 14px;
            background: transparent;
            color: var(--dark-gray);
            border: 1px solid var(--medium-gray);
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-speak:hover {
            background: var(--soft-gray);
        }

        .btn-speak.speaking {
            background: var(--text-gray);
            color: var(--cloud-dancer);
        }

        .result-content {
            font-size: 1.05rem;
            line-height: 2.2;
            letter-spacing: 0.02em;
        }

        .result-content p {
            margin-bottom: 12px;
        }

        .result-content ruby {
            display: inline-flex;
            flex-direction: column-reverse;
            align-items: center;
            vertical-align: bottom;
            ruby-position: over;
            -webkit-ruby-position: before;
        }

        .result-content rt {
            display: block;
            font-size: 0.5em;
            line-height: 1.2;
            color: var(--text-gray);
            text-align: center;
        }
        
        /* iOS Safari fallback */
        @supports not (ruby-position: over) {
            .result-content ruby {
                display: inline-flex;
                flex-direction: column-reverse;
            }
        }

        .error {
            padding: 12px 16px;
            background: #FFF0F0;
            border: 1px solid #FFDDDD;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #AA4444;
            margin-top: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.65rem;
            color: var(--medium-gray);
            letter-spacing: 0.1em;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>やさしいニュースメーカー</h1>
            <p class="subtitle">Easy News Maker</p>
        </header>

        <!-- API Key Section -->
        <div class="section">
            <div class="api-section">
                <div class="input-wrap">
                    <label>API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-ant-..." />
                </div>
                <button class="btn-secondary" onclick="saveApiKey()">保存</button>
            </div>
            <div id="apiStatus" class="api-status hidden"></div>
        </div>

        <!-- Input Section -->
        <div class="section">
            <label>記事を貼り付けてください</label>
            <textarea id="inputText" placeholder="ニュース記事をここに貼り付けてください..."></textarea>
        </div>

        <!-- Convert Button -->
        <button class="btn" id="convertBtn" onclick="convertNews()">変換する</button>

        <!-- Error -->
        <div id="error" class="error hidden"></div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">変換中</div>

        <!-- Result -->
        <div id="resultBox" class="result-box hidden">
            <div class="result-header">
                <span class="result-label">やさしいニュース</span>
                <button class="btn-speak" id="speakBtn" onclick="toggleSpeak()">
                    <span id="speakIcon">🔊</span>
                    <span id="speakText">読み上げる</span>
                </button>
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>

        <footer>
            JLPT N4〜N3 Level • One Day One Tool
        </footer>
    </div>

    <script>
        let isSpeaking = false;

        // 페이지 로드 시 저장된 API 키 불러오기
        window.onload = function() {
            const savedKey = localStorage.getItem('anthropic_api_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
                showApiStatus('保存済み', true);
            }
        };

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key) {
                localStorage.setItem('anthropic_api_key', key);
                showApiStatus('保存しました', true);
            } else {
                localStorage.removeItem('anthropic_api_key');
                showApiStatus('削除しました', false);
            }
        }

        function showApiStatus(message, isSaved) {
            const status = document.getElementById('apiStatus');
            status.textContent = message;
            status.className = isSaved ? 'api-status saved' : 'api-status';
            status.classList.remove('hidden');
            setTimeout(() => {
                status.textContent = isSaved ? '✓ 保存済み' : '';
                if (!isSaved) status.classList.add('hidden');
            }, 2000);
        }

        async function convertNews() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const inputText = document.getElementById('inputText').value.trim();

            // Validation
            if (!apiKey) {
                showError('API Keyを入力してください');
                return;
            }
            if (!inputText) {
                showError('記事を入力してください');
                return;
            }

            // UI 상태 변경
            hideError();
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('convertBtn').disabled = true;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1200,
                        messages: [
                            {
                                role: 'user',
                                content: `以下の記事を「やさしい日本語」に変換してください。

【ルール】
1. JLPT N4〜N3レベルの語彙と文法を使用
2. 7〜10行で簡潔に要約（重要な情報のみ）
3. 漢字には必ず振り仮名をつける（HTML ruby形式）
4. 一文は短く、簡潔に
5. 難しい専門用語は簡単な言葉で言い換える

【出力形式】
HTMLのみを出力してください。説明や前置きは不要です。
振り仮名は <ruby>漢字<rt>かんじ</rt></ruby> の形式で。
段落は <p> タグで分けてください。

【記事】
${inputText}`
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || 'API エラーが発生しました');
                }

                if (data.content && data.content[0] && data.content[0].text) {
                    showResult(data.content[0].text);
                } else {
                    throw new Error('変換結果を取得できませんでした');
                }
            } catch (err) {
                showError(err.message);
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('convertBtn').disabled = false;
            }
        }

        function showResult(html) {
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('resultBox').classList.remove('hidden');
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error').classList.add('hidden');
        }

        function toggleSpeak() {
            const resultContent = document.getElementById('resultContent');
            
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                updateSpeakButton(false);
                return;
            }

            // HTML 태그 제거, 후리가나(rt) 제거
            const textOnly = resultContent.innerHTML
                .replace(/<rt>.*?<\/rt>/g, '')
                .replace(/<[^>]*>/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            const utterance = new SpeechSynthesisUtterance(textOnly);
            utterance.lang = 'ja-JP';
            utterance.rate = 0.85;

            utterance.onend = () => updateSpeakButton(false);
            utterance.onerror = () => updateSpeakButton(false);

            updateSpeakButton(true);
            window.speechSynthesis.speak(utterance);
        }

        function updateSpeakButton(speaking) {
            isSpeaking = speaking;
            const btn = document.getElementById('speakBtn');
            const icon = document.getElementById('speakIcon');
            const text = document.getElementById('speakText');

            if (speaking) {
                btn.classList.add('speaking');
                icon.textContent = '⏹';
                text.textContent = '停止';
            } else {
                btn.classList.remove('speaking');
                icon.textContent = '🔊';
                text.textContent = '読み上げる';
            }
        }
    </script>

    <!-- Service Worker 등록 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed'));
            });
        }
    </script>
</body>
</html>
